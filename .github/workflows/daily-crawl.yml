name: 네이버 검색 크롤러

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:      # 수동 실행 허용

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 결과 파일 커밋을 위해 필요

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Google Sheets 인증 파일 생성
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            echo "$GOOGLE_CREDENTIALS" > credentials.json
            echo "credentials.json 생성 완료"
          else
            echo "GOOGLE_CREDENTIALS 시크릿 없음 — Sheets 업로드 건너뜀"
          fi

      - name: 크롤러 실행
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
        run: python scraper.py

      - name: 결과 파일 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: crawling-results-${{ github.run_number }}
          path: |
            results.json
            results.csv
            results.md
          retention-days: 30

      - name: 결과 저장소 커밋
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add results.json results.csv results.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경된 결과 없음 — 커밋 건너뜀"
          else
            git commit -m "자동 크롤링 결과 업데이트: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
